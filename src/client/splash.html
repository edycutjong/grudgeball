<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Grudgeball</title>
  </head>
  <body>
    <div class="splash">
      <div class="title">GRUDGE<span class="b">BALL</span></div>
      <div class="tag" id="tag">Drop. Die. Plant your revenge. Count the bodies at dawn.</div>
      <canvas id="snapshot" width="360" height="960" aria-label="Today's board"></canvas>
      <div class="stat" id="stat">loading board…</div>
      <button id="enter" type="button">ENTER THE GAUNTLET</button>
      <div class="hint">A new board every day, built by everyone who played yesterday.</div>
    </div>
    <script type="module" src="./splash.ts"></script>
  </body>
</html>
